<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#9fd095">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="整">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mindful Life Log</title>
  <link rel="manifest" href="manifest.webmanifest?v=20260320-2">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=20260320-2">
  <link rel="icon" href="icons/icon-192.png?v=20260320-2" type="image/png">
  <link rel="stylesheet" href="styles.css?v=20260320-2">
</head>
<body>
  <div class="app-shell">
    <header class="top-header" id="topHeader">
      <div class="header-row row-1">
        <h1 class="app-title">Mindful Life Log</h1>
        <div class="header-actions">
          <button class="icon-button update-button" id="updateButton" type="button" aria-label="更新">
            <span aria-hidden="true">⟳</span>
          </button>
          <button class="icon-button settings-button" id="settingsButton" type="button" aria-label="設定">
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </div>
      <div class="header-row row-2">
        <button class="summary-link" id="summaryButton" type="button">2026年まとめ</button>
        <div class="year-switch" aria-label="年切り替え">
          <button id="yearPrevButton" class="year-button" type="button" aria-label="前年">◀</button>
          <p id="yearLabel" class="year-label">2026年</p>
          <button id="yearNextButton" class="year-button" type="button" aria-label="翌年">▶</button>
        </div>
      </div>
      <div class="header-row row-3">
        <div class="month-tabs" id="monthTabs" role="tablist" aria-label="月タブ"></div>
      </div>
    </header>

    <main id="monthSections" class="month-sections"></main>
  </div>

  <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="settingsTitle">バックアップ</h2>
        <button id="closeSettingsButton" class="close-button" type="button" aria-label="閉じる">×</button>
      </div>

      <section class="modal-section">
        <h3>バックアップ文字列を作成</h3>
        <button id="createBackupButton" class="plain-button" type="button">作成</button>
        <textarea id="backupOutput" rows="5" readonly></textarea>
      </section>

      <section class="modal-section">
        <h3>復元</h3>
        <textarea id="restoreInput" rows="5" placeholder="ここにバックアップ文字列を貼り付け"></textarea>
        <button id="restoreButton" class="plain-button" type="button">復元する</button>
      </section>
    </div>
  </div>

  <div id="weightPickerModal" class="modal picker-modal hidden" role="dialog" aria-modal="true" aria-labelledby="weightPickerTitle">
    <div class="picker-sheet">
      <div class="picker-head">
        <h2 id="weightPickerTitle">体重</h2>
        <p class="picker-range">50.0kg - 80.0kg</p>
      </div>
      <p id="weightPickerValue" class="picker-value">50.0</p>
      <div id="weightPickerList" class="weight-picker-list" role="listbox" aria-label="体重選択"></div>
      <div class="picker-actions">
        <button id="resetWeightPickerButton" class="picker-action picker-reset" type="button">リセット</button>
        <button id="doneWeightPickerButton" class="picker-action picker-done" type="button">完了</button>
      </div>
    </div>
  </div>

  <div id="noteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="noteTitle">
    <div class="modal-card note-modal-card">
      <div class="modal-head">
        <h2 id="noteTitle">備考</h2>
      </div>
      <section class="modal-section">
        <textarea id="noteInput" rows="6" placeholder="備考を入力"></textarea>
      </section>
      <div class="picker-actions">
        <button id="resetNoteButton" class="picker-action picker-reset" type="button">リセット</button>
        <button id="doneNoteButton" class="picker-action picker-done" type="button">完了</button>
      </div>
    </div>
  </div>

  <script src="common.js?v=20260320-2"></script>
  <script src="app.js?v=20260320-2"></script>
</body>
</html>
