<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="appIconTitle appIconDesc">
  <title id="appIconTitle">Mindful Life Log app icon</title>
  <desc id="appIconDesc">Blue gradient app icon with the kanji U+6574 in a rounded bold gothic style.</desc>
  <defs>
    <linearGradient id="iconBackground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A3CDCD" />
      <stop offset="100%" stop-color="#81A9D8" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#iconBackground)" />
  <text
    x="512"
    y="540"
    fill="#5A7073"
    font-size="580"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Yu Gothic UI Semibold', 'HGMaruGothicMPRO', 'BIZ UDPGothic', 'Noto Sans JP Black', 'Meiryo', sans-serif"
  >&#x6574;</text>
</svg>
